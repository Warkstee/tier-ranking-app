services:
  tier-ranking-app:
    image: ghcr.io/warkstee/tier-ranking-app:dev
    build: .
    ports:
      - "4173:80"
    volumes:
      - ./data/candidates:/usr/share/nginx/html/assets/candidates
      - db-data:/app/data
    environment:
      - DB_PATH=/app/data/tier-ranking.db
    restart: unless-stopped

volumes:
  db-data:
      
