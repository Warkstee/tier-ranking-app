<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S-Tier Ranking Board</title>
  <link rel="stylesheet" href="./css/base.css?v=3">
  <link rel="stylesheet" href="./css/layout.css?v=3">
  <link rel="stylesheet" href="./css/tier-board.css?v=3">
  <link rel="stylesheet" href="./css/detail-modal.css?v=3">
  <link rel="stylesheet" href="./css/config-modal.css?v=3">
  <link rel="stylesheet" href="./css/add-candidate.css?v=3">
  <link rel="stylesheet" href="./css/components.css?v=3">
  <link rel="stylesheet" href="./css/file-menu.css?v=3">
  <link rel="stylesheet" href="./css/auth.css?v=3">
</head>
<body>
  <main class="app-shell" data-app-shell>
    <div class="scene-backdrop" aria-hidden="true"></div>
    <header class="topbar">
      <div class="burger-menu-container">
        <button type="button" class="burger-button" data-burger-menu aria-label="Menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div class="burger-dropdown" data-burger-dropdown hidden>
          <div class="burger-menu-item has-submenu" data-submenu="file">
            <span>File</span>
            <svg class="submenu-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            <div class="burger-submenu" data-submenu-panel="file" hidden>
              <button type="button" data-file-new>New Ranking File</button>
              <div class="submenu-item-with-flyout" data-flyout-trigger="open">
                <button type="button" data-file-open>Open File...</button>
              </div>
              <button type="button" data-file-save>Save File...</button>
              <button type="button" data-file-save-as>Save As...</button>
              <button type="button" data-file-export>Download File...</button>
              <button type="button" data-file-import>Upload File...</button>
              <input type="file" accept=".zip" data-file-import-input hidden>
              <div class="submenu-item-with-flyout" data-flyout-trigger="delete">
                <button type="button" data-file-delete>Delete File...</button>
              </div>
              <div class="ranking-flyout" data-ranking-flyout hidden>
                <div class="ranking-flyout-list" data-ranking-flyout-list></div>
              </div>
            </div>
          </div>
          <button type="button" class="burger-menu-item" data-open-config>Edit Criteria...</button>
          <button type="button" class="burger-menu-item" data-open-tier-editor>Edit Tiers...</button>
          <button type="button" class="burger-menu-item" data-reset-config>Reset Scores & Rankings...</button>
        </div>
      </div>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="12" width="5" height="9" rx="1" fill="#111"/>
            <rect x="9.5" y="3" width="5" height="18" rx="1" fill="#111"/>
            <rect x="16" y="8" width="5" height="13" rx="1" fill="#111"/>
          </svg>
        </div>
        <div class="brand-copy">
          <h1 data-title>S-Tier Ranking Board</h1>
          <button class="title-edit-btn" type="button" aria-label="Edit title" data-title-edit>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
            </svg>
          </button>
        </div>
      </div>
      <nav class="menu" aria-label="Board controls">
        <div class="current-ranking-name" data-current-ranking-name>
          <svg class="file-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          <span class="file-name" data-file-name></span>
          <span class="file-status-pill" data-file-status></span>
        </div>
      </nav>
      <div class="user-info" data-user-info hidden>
        <span class="user-info-username" data-user-username></span>
        <button type="button" class="user-info-logout" data-user-logout>Logout</button>
      </div>
    </header>

    <section class="workspace">
      <section class="tier-board" aria-label="Tier ranking canvas" data-tier-board></section>

      <aside class="right-rail" aria-label="Candidate list and host safe area">
        <section class="unranked-panel" aria-label="Unranked candidates">
          <div class="panel-header">
            <div class="panel-header-left">
              <b>Unranked</b>
              <span class="count-bubble" data-unranked-count>0 of 0</span>
            </div>
            <button type="button" class="add-candidate-btn" data-open-add-candidate aria-label="Add Candidate">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
          </div>
          <div class="unranked-list" data-drop-zone="Unranked" data-unranked-list></div>
        </section>

        <section class="host-safe" aria-label="Host safe area"></section>
      </aside>
    </section>

    <section class="detail-modal" aria-label="Selected candidate details" data-modal hidden>
      <div class="modal-layout">
        <article class="detail-card" data-detail-card></article>
      </div>
    </section>

    <section class="tier-editor-modal" aria-label="Tier editor" data-tier-editor-modal hidden>
      <article class="tier-editor-panel">
        <header class="tier-editor-header">
          <div>
            <h2>Tiers</h2>
          </div>
          <button class="tier-editor-close" type="button" aria-label="Close tier editor" data-close-tier>x</button>
        </header>

        <div class="tier-editor-content">
          <section class="tier-editor-section">
            <h3>Ranking Tiers</h3>
            <div class="tiers-list" data-tiers-list></div>
            <button type="button" class="btn-add-tier" data-add-tier>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Add Tier
            </button>
          </section>
        </div>

        <footer class="tier-editor-footer">
          <p data-tier-status role="status" aria-live="polite"></p>
          <div class="tier-editor-actions">
            <button type="button" data-cancel-tier>Cancel</button>
            <button type="button" data-apply-tier>Apply Changes</button>
          </div>
        </footer>
      </article>
    </section>

    <section class="config-modal" aria-label="Configuration editor" data-config-modal hidden>
      <article class="config-panel">
        <header class="config-header">
          <div>
            <h2>Configuration</h2>
          </div>
          <button class="config-close" type="button" aria-label="Close config editor" data-close-config>x</button>
        </header>

        <div class="config-content">
          <section class="config-section">
            <h3>Score Range</h3>
            <div class="score-range-controls">
              <div class="form-field">
                <label for="config-min">Minimum Score</label>
                <input type="number" id="config-min" data-config-min min="0" max="100" step="1">
              </div>
              <div class="form-field">
                <label for="config-max">Maximum Score</label>
                <input type="number" id="config-max" data-config-max min="1" max="100" step="1">
              </div>
            </div>
          </section>

          <section class="config-section">
            <h3>Scoring Criteria</h3>
            <div class="facets-list" data-facets-list></div>
            <button type="button" class="btn-add-facet" data-add-facet>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Add Criterion
            </button>
          </section>
        </div>

        <footer class="config-footer">
          <p data-config-status role="status" aria-live="polite"></p>
          <div class="config-actions">
            <button type="button" data-cancel-config>Cancel</button>
            <button type="button" data-apply-config>Apply Changes</button>
          </div>
        </footer>
      </article>
    </section>

    <section class="add-candidate-modal" aria-label="Add new candidate" data-add-candidate-modal hidden>
      <article class="add-candidate-panel">
        <header class="add-candidate-header">
          <h2>Add Candidate</h2>
          <button class="add-candidate-close" type="button" aria-label="Close add candidate dialog" data-close-add-candidate>x</button>
        </header>

        <form class="add-candidate-form" data-add-candidate-form>
          <div class="form-field">
            <label for="add-candidate-name">Name</label>
            <input type="text" id="add-candidate-name" name="name" required maxlength="23" autocomplete="off" spellcheck="false" data-add-candidate-name>
            <span class="char-counter" data-add-char-counter>23 characters remaining</span>
          </div>

          <div class="form-field">
            <label for="add-candidate-image">Image (optional)</label>
            <input type="file" id="add-candidate-image" name="image" accept="image/jpeg,image/png,image/gif,image/webp" data-add-candidate-image>
          </div>

          <footer class="add-candidate-footer">
            <button type="button" data-cancel-add-candidate>Cancel</button>
            <button type="submit" data-submit-add-candidate>Add</button>
          </footer>
        </form>
      </article>
    </section>

    <section class="name-input-modal" aria-label="Enter ranking name" data-name-input-modal hidden>
      <article class="name-input-panel">
        <header class="name-input-header">
          <h2 data-name-input-title>Enter Name</h2>
          <button class="name-input-close" type="button" aria-label="Close dialog" data-close-name-input>x</button>
        </header>
        <form class="name-input-form" data-name-input-form>
          <div class="form-field">
            <label for="name-input-field">Name</label>
            <input type="text" id="name-input-field" name="name" required maxlength="50" autocomplete="off" spellcheck="false" data-name-input-field>
          </div>
          <footer class="name-input-footer">
            <button type="button" data-cancel-name-input>Cancel</button>
            <button type="submit" data-submit-name-input>OK</button>
          </footer>
        </form>
      </article>
    </section>

  </main>

  <!-- Login overlay -->
  <section class="auth-overlay" data-login-overlay hidden>
    <article class="auth-panel">
      <header class="auth-header">
        <div class="auth-brand">
          <div class="auth-brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="12" width="5" height="9" rx="1" fill="#111"/>
              <rect x="9.5" y="3" width="5" height="18" rx="1" fill="#111"/>
              <rect x="16" y="8" width="5" height="13" rx="1" fill="#111"/>
            </svg>
          </div>
          <h2>Sign In</h2>
        </div>
      </header>
      <div class="auth-content">
        <form class="auth-form" data-login-form>
          <div class="auth-error" data-login-error hidden></div>
          <div class="form-field">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" name="username" required autocomplete="username" data-login-username>
          </div>
          <div class="form-field">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required autocomplete="current-password" data-login-password>
          </div>
          <footer class="auth-footer">
            <button type="submit" class="auth-submit" data-login-submit>Sign In</button>
            <div class="auth-toggle">
              <span>Don't have an account?</span>
              <button type="button" data-show-signup>Sign Up</button>
            </div>
          </footer>
        </form>
      </div>
    </article>
  </section>

  <!-- Signup overlay -->
  <section class="auth-overlay" data-signup-overlay hidden>
    <article class="auth-panel">
      <header class="auth-header">
        <div class="auth-brand">
          <div class="auth-brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="12" width="5" height="9" rx="1" fill="#111"/>
              <rect x="9.5" y="3" width="5" height="18" rx="1" fill="#111"/>
              <rect x="16" y="8" width="5" height="13" rx="1" fill="#111"/>
            </svg>
          </div>
          <h2>Sign Up</h2>
        </div>
      </header>
      <div class="auth-content">
        <form class="auth-form" data-signup-form>
          <div class="auth-error" data-signup-error hidden></div>
          <div class="form-field">
            <label for="signup-username">Username</label>
            <input type="text" id="signup-username" name="username" required autocomplete="username" data-signup-username>
          </div>
          <div class="form-field">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" name="password" required autocomplete="new-password" data-signup-password>
          </div>
          <div class="form-field">
            <label for="signup-password-confirm">Confirm Password</label>
            <input type="password" id="signup-password-confirm" name="password-confirm" required autocomplete="new-password" data-signup-password-confirm>
          </div>
          <footer class="auth-footer">
            <button type="submit" class="auth-submit" data-signup-submit>Sign Up</button>
            <div class="auth-toggle">
              <span>Already have an account?</span>
              <button type="button" data-show-login>Sign In</button>
            </div>
          </footer>
        </form>
      </div>
    </article>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="./js/app.js" type="module"></script>
</body>
</html>
