<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S-Tier Ranking Board</title>
  <link rel="stylesheet" href="./css/base.css?v=3">
  <link rel="stylesheet" href="./css/layout.css?v=3">
  <link rel="stylesheet" href="./css/tier-board.css?v=3">
  <link rel="stylesheet" href="./css/detail-modal.css?v=3">
  <link rel="stylesheet" href="./css/config-modal.css?v=3">
  <link rel="stylesheet" href="./css/add-candidate.css?v=3">
  <link rel="stylesheet" href="./css/components.css?v=3">
  <link rel="stylesheet" href="./css/file-menu.css?v=3">
</head>
<body>
  <main class="app-shell" data-app-shell>
    <div class="scene-backdrop" aria-hidden="true"></div>
    <header class="topbar">
      <div class="burger-menu-container">
        <button type="button" class="burger-button" data-burger-menu aria-label="Menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div class="burger-dropdown" data-burger-dropdown hidden>
          <div class="burger-menu-item has-submenu" data-submenu="file">
            <span>File</span>
            <svg class="submenu-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            <div class="burger-submenu" data-submenu-panel="file" hidden>
              <button type="button" data-file-new>New Ranking File</button>
              <button type="button" data-file-open>Open File...</button>
              <button type="button" data-file-save>Save File...</button>
              <button type="button" data-file-save-as>Save As...</button>
              <button type="button" data-file-delete>Delete File...</button>
            </div>
          </div>
          <button type="button" class="burger-menu-item" data-open-config>Edit Criteria...</button>
          <button type="button" class="burger-menu-item" data-reset-config>Reset Scores and Ranking...</button>
        </div>
      </div>
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-copy">
          <h1 data-title>S-Tier Ranking Board</h1>
          <span>tier board</span>
        </div>
      </div>
      <nav class="menu" aria-label="Board controls">
        <span class="current-ranking-name" data-current-ranking-name></span>
      </nav>
    </header>

    <section class="workspace">
      <section class="tier-board" aria-label="Tier ranking canvas" data-tier-board></section>

      <aside class="right-rail" aria-label="Candidate list and host safe area">
        <section class="unranked-panel" aria-label="Unranked candidates">
          <div class="panel-header">
            <div class="panel-header-left">
              <b>Unranked</b>
              <span class="count-bubble" data-unranked-count>0 of 0</span>
            </div>
            <button type="button" class="add-candidate-btn" data-open-add-candidate aria-label="Add Candidate">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </button>
          </div>
          <div class="unranked-list" data-drop-zone="Unranked" data-unranked-list></div>
        </section>

        <section class="host-safe" aria-label="Host safe area"></section>
      </aside>
    </section>

    <section class="detail-modal" aria-label="Selected candidate details" data-modal hidden>
      <div class="modal-layout">
        <article class="detail-card" data-detail-card></article>
      </div>
    </section>

    <section class="config-modal" aria-label="Configuration editor" data-config-modal hidden>
      <article class="config-panel">
        <header class="config-header">
          <div>
            <h2>Configuration</h2>
          </div>
          <button class="config-close" type="button" aria-label="Close config editor" data-close-config>x</button>
        </header>

        <div class="config-content">
          <section class="config-section">
            <h3>Score Range</h3>
            <div class="score-range-controls">
              <div class="form-field">
                <label for="config-min">Minimum Score</label>
                <input type="number" id="config-min" data-config-min min="0" max="100" step="1">
              </div>
              <div class="form-field">
                <label for="config-max">Maximum Score</label>
                <input type="number" id="config-max" data-config-max min="1" max="100" step="1">
              </div>
            </div>
          </section>

          <section class="config-section">
            <h3>Scoring Criteria</h3>
            <div class="facets-list" data-facets-list></div>
            <button type="button" class="btn-add-facet" data-add-facet>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Add Criterion
            </button>
          </section>
        </div>

        <footer class="config-footer">
          <p data-config-status role="status" aria-live="polite"></p>
          <div class="config-actions">
            <button type="button" data-cancel-config>Cancel</button>
            <button type="button" data-apply-config>Apply Changes</button>
          </div>
        </footer>
      </article>
    </section>

    <section class="add-candidate-modal" aria-label="Add new candidate" data-add-candidate-modal hidden>
      <article class="add-candidate-panel">
        <header class="add-candidate-header">
          <h2>Add Candidate</h2>
          <button class="add-candidate-close" type="button" aria-label="Close add candidate dialog" data-close-add-candidate>x</button>
        </header>

        <form class="add-candidate-form" data-add-candidate-form>
          <div class="form-field">
            <label for="add-candidate-name">Name</label>
            <input type="text" id="add-candidate-name" name="name" required maxlength="23" autocomplete="off" spellcheck="false" data-add-candidate-name>
            <span class="char-counter" data-add-char-counter>23 characters remaining</span>
          </div>

          <div class="form-field">
            <label for="add-candidate-image">Image (optional)</label>
            <input type="file" id="add-candidate-image" name="image" accept="image/jpeg,image/png,image/gif,image/webp" data-add-candidate-image>
          </div>

          <footer class="add-candidate-footer">
            <button type="button" data-cancel-add-candidate>Cancel</button>
            <button type="submit" data-submit-add-candidate>Add</button>
          </footer>
        </form>
      </article>
    </section>

    <section class="name-input-modal" aria-label="Enter ranking name" data-name-input-modal hidden>
      <article class="name-input-panel">
        <header class="name-input-header">
          <h2 data-name-input-title>Enter Name</h2>
          <button class="name-input-close" type="button" aria-label="Close dialog" data-close-name-input>x</button>
        </header>
        <form class="name-input-form" data-name-input-form>
          <div class="form-field">
            <label for="name-input-field">Name</label>
            <input type="text" id="name-input-field" name="name" required maxlength="50" autocomplete="off" spellcheck="false" data-name-input-field>
          </div>
          <footer class="name-input-footer">
            <button type="button" data-cancel-name-input>Cancel</button>
            <button type="submit" data-submit-name-input>OK</button>
          </footer>
        </form>
      </article>
    </section>

    <section class="open-ranking-modal" aria-label="Open ranking" data-open-ranking-modal hidden>
      <article class="open-ranking-panel">
        <header class="open-ranking-header">
          <h2>Open Ranking</h2>
          <button class="open-ranking-close" type="button" aria-label="Close dialog" data-close-open-ranking>x</button>
        </header>
        <div class="open-ranking-list" data-open-ranking-list></div>
        <footer class="open-ranking-footer">
          <button type="button" data-close-open-ranking-footer>Close</button>
        </footer>
      </article>
    </section>
  </main>

  <script src="./js/app.js" type="module"></script>
</body>
</html>
