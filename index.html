<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S-Tier Ranking Board</title>
  <link rel="stylesheet" href="./styles.css?v=6">
</head>
<body>
  <main class="app-shell" data-app-shell>
    <div class="scene-backdrop" aria-hidden="true"></div>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-copy">
          <h1 data-title>S-Tier Ranking Board</h1>
          <span>tier board</span>
        </div>
      </div>
      <nav class="menu" aria-label="Board controls">
        <button type="button" data-open-add-candidate>Add Candidate</button>
        <button type="button" data-open-config>Config</button>
        <button type="button" data-reset-config>Reset</button>
      </nav>
    </header>

    <section class="workspace">
      <section class="tier-board" aria-label="Tier ranking canvas" data-tier-board></section>

      <aside class="right-rail" aria-label="Candidate list and host safe area">
        <section class="unranked-panel" aria-label="Unranked candidates">
          <div class="panel-header">
            <b>Unranked</b>
            <span data-unranked-count>0 candidates</span>
          </div>
          <div class="unranked-list" data-drop-zone="Unranked" data-unranked-list></div>
        </section>

        <section class="host-safe" aria-label="Host safe area"></section>
      </aside>
    </section>

    <section class="detail-modal" aria-label="Selected candidate details" data-modal hidden>
      <div class="modal-layout">
        <article class="detail-card" data-detail-card></article>
      </div>
    </section>

    <section class="config-modal" aria-label="JSON config editor" data-config-modal hidden>
      <article class="config-panel">
        <header class="config-header">
          <div>
            <h2>Config</h2>
            <span data-config-source>tier-ranking.json</span>
          </div>
          <button class="config-close" type="button" aria-label="Close config editor" data-close-config>x</button>
        </header>

        <textarea data-config-editor spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>

        <footer class="config-footer">
          <p data-config-status role="status" aria-live="polite"></p>
          <div class="config-actions">
            <button type="button" data-download-config>Download tier-ranking.json</button>
            <button type="button" data-save-config hidden>Save as tier-ranking.json</button>
            <button type="button" data-apply-config>Apply</button>
          </div>
        </footer>
      </article>
    </section>

    <section class="add-candidate-modal" aria-label="Add new candidate" data-add-candidate-modal hidden>
      <article class="add-candidate-panel">
        <header class="add-candidate-header">
          <h2>Add Candidate</h2>
          <button class="add-candidate-close" type="button" aria-label="Close add candidate dialog" data-close-add-candidate>x</button>
        </header>

        <form class="add-candidate-form" data-add-candidate-form>
          <div class="form-field">
            <label for="add-candidate-name">Name</label>
            <input type="text" id="add-candidate-name" name="name" required maxlength="23" autocomplete="off" spellcheck="false" data-add-candidate-name>
            <span class="char-counter" data-add-char-counter>23 characters remaining</span>
          </div>

          <div class="form-field">
            <label for="add-candidate-image">Image (optional)</label>
            <input type="file" id="add-candidate-image" name="image" accept="image/jpeg,image/png,image/gif,image/webp" data-add-candidate-image>
          </div>

          <footer class="add-candidate-footer">
            <button type="button" data-cancel-add-candidate>Cancel</button>
            <button type="submit" data-submit-add-candidate>Add</button>
          </footer>
        </form>
      </article>
    </section>
  </main>

  <script src="./app.js" type="module"></script>
</body>
</html>
