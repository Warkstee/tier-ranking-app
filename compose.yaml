services:
  api:
    build: ./api
    volumes:
      - ./data/rankings:/app/rankings
      - ./data/candidates:/app/assets/candidates
  tier-ranking-app:
    image: ghcr.io/ironicbadger/tier-ranking-app:latest
    build: .
    ports:
      - "4173:80"
    volumes:
      - ./data/candidates:/usr/share/nginx/html/assets/candidates
    depends_on:
      - api
      
