services:
  api:
    build: ./api
    volumes:
      - ./config.yml:/app/config.yml
      - ./assets/candidates:/app/assets/candidates
  tier-ranking-app:
    image: ghcr.io/ironicbadger/tier-ranking-app:latest
    build: .
    ports:
      - "4173:80"
    volumes:
      - ./config.yml:/usr/share/nginx/html/config.yml:ro
      - ./assets/candidates:/usr/share/nginx/html/assets/candidates
    depends_on:
      - api
      
